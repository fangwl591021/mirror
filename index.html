<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MirrorStream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #07C160;
            --bg: #FFFFFF;
            --secondary-bg: #F7F7F7;
            --text-main: #000000;
            --text-sub: #888888;
            --danger: #FF3B30;
        }
        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        h2 { font-size: 18px; margin-bottom: 20px; text-align: center; font-weight: 500; }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-primary { background-color: var(--primary); color: #fff; }
        .btn-outline { background-color: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-danger { background-color: var(--danger); color: #fff; margin-top: 20px; }
        
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            background: var(--secondary-bg);
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; display: none; }
        .status { font-size: 13px; color: var(--text-sub); text-align: center; }
        .hidden { display: none; }
        video { width: 100%; border-radius: 8px; background: #000; display: none; margin-top: 10px; }
        #remoteVideo.active { display: block; }
        .id-badge { font-weight: bold; color: var(--primary); font-size: 24px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="appTitle">MirrorStream</h2>
    
    <!-- 模式選擇 -->
    <div id="setupMode">
        <button class="btn btn-primary" onclick="initReceiver()">我是電腦 (接收端)</button>
        <button class="btn btn-outline" onclick="initSender()">我是手機 (傳送端)</button>
    </div>

    <!-- 接收端 UI -->
    <div id="receiverUI" class="hidden">
        <div id="qrcode"></div>
        <p class="status">連線 ID</p>
        <p class="status"><span id="myIdDisplay" class="id-badge">....</span></p>
        <video id="remoteVideo" autoplay playsinline></video>
        <button id="stopRecvBtn" class="btn btn-danger hidden" onclick="location.reload()">停止接收</button>
    </div>

    <!-- 傳送端 UI -->
    <div id="senderUI" class="hidden">
        <div id="reader"></div>
        <button id="scanBtn" class="btn btn-outline" onclick="toggleScanner()">掃描電腦 QR Code</button>
        <input type="text" id="targetId" placeholder="輸入 4 碼連線 ID" maxlength="4">
        <button id="startBtn" class="btn btn-primary" onclick="startMirroring()">開始鏡像投影</button>
        <button id="stopBtn" class="btn btn-danger hidden" onclick="stopMirroring()">停止投影</button>
        <p id="senderStatus" class="status">準備就緒</p>
    </div>
</div>

<script>
    let peer = null;
    let localStream = null;
    let html5QrCode = null;
    let currentCall = null;

    // 產生 4 碼隨機 ID (英數混合)
    function generateShortId() {
        return Math.random().toString(36).substr(2, 4).toUpperCase();
    }

    function initReceiver() {
        const shortId = generateShortId();
        document.getElementById('appTitle').innerText = "等待鏡像連線";
        showUI('receiverUI');
        
        // 使用自定義的短 ID 初始化 Peer
        peer = new Peer(shortId);
        
        peer.on('open', (id) => {
            document.getElementById('myIdDisplay').innerText = id;
            generateQR(id);
        });

        peer.on('call', (call) => {
            currentCall = call;
            call.answer();
            call.on('stream', (stream) => {
                const video = document.getElementById('remoteVideo');
                video.srcObject = stream;
                video.classList.add('active');
                document.getElementById('qrcode').classList.add('hidden');
                document.getElementById('stopRecvBtn').classList.remove('hidden');
                document.getElementById('appTitle').innerText = "投影中";
            });
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                // ID 重複則重新整理再試一次
                location.reload();
            } else {
                console.error(err);
            }
        });
    }

    function initSender() {
        document.getElementById('appTitle').innerText = "手機鏡像投影";
        showUI('senderUI');
        const tid = new URLSearchParams(window.location.search).get('target');
        if (tid) document.getElementById('targetId').value = tid;
        peer = new Peer();
    }

    async function toggleScanner() {
        const readerDiv = document.getElementById('reader');
        if (readerDiv.style.display === "block") { stopScanner(); return; }
        readerDiv.style.display = "block";
        document.getElementById('scanBtn').innerText = "關閉掃描器";
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                try {
                    const url = new URL(text);
                    document.getElementById('targetId').value = url.searchParams.get('target') || text;
                } catch { document.getElementById('targetId').value = text; }
                stopScanner();
            });
        } catch (e) { alert("開啟相機失敗"); stopScanner(); }
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = "none";
                document.getElementById('scanBtn').innerText = "掃描電腦 QR Code";
            });
        }
    }

    async function startMirroring() {
        let tid = document.getElementById('targetId').value;
        if (!tid) return alert("請輸入 ID");
        tid = tid.toUpperCase(); // 強制轉大寫

        if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
            return alert("您的瀏覽器不支援螢幕鏡像投影\n請使用 Android Chrome 或 PC 瀏覽器嘗試。");
        }

        try {
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            currentCall = peer.call(tid, localStream);
            
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('scanBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('senderStatus').innerText = "鏡像投影中";
            
            localStream.getVideoTracks()[0].onended = () => stopMirroring();
        } catch (err) {
            alert("投影失敗: " + err.message);
        }
    }

    function stopMirroring() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
        }
        if (currentCall) currentCall.close();
        location.reload();
    }

    function generateQR(id) {
        const url = window.location.href.split('?')[0] + "?target=" + id;
        new QRCode(document.getElementById("qrcode"), { text: url, width: 200, height: 200 });
    }

    function showUI(id) {
        document.getElementById('setupMode').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }
</script>

</body>
</html>
