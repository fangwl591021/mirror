<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MirrorStream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #07C160;
            --bg: #FFFFFF;
            --secondary-bg: #F7F7F7;
            --text-main: #000000;
            --text-sub: #888888;
            --warning: #ff9500;
        }
        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h2 { font-size: 20px; margin-bottom: 30px; text-align: center; font-weight: 500; }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
        }
        .btn-primary { background-color: var(--primary); color: #fff; }
        .btn-outline { background-color: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .input-group { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            background: var(--secondary-bg);
        }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 20px; display: none; }
        .status { font-size: 13px; color: var(--text-sub); text-align: center; margin-top: 10px; }
        .warning-box {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
            margin-bottom: 15px;
            display: none;
        }
        .hidden { display: none; }
        video { width: 100%; border-radius: 8px; background: #000; display: none; }
        #remoteVideo.active { display: block; }
        .id-badge { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2 id="appTitle">MirrorStream</h2>
    
    <!-- 初始選擇 -->
    <div id="setupMode">
        <button class="btn btn-primary" onclick="initReceiver()">我是電腦 (接收端)</button>
        <button class="btn btn-outline" onclick="initSender()">我是手機 (傳送端)</button>
    </div>

    <!-- 接收端 UI (PC) -->
    <div id="receiverUI" class="hidden">
        <div id="qrcode"></div>
        <p class="status">請用手機掃描上方代碼</p>
        <p class="status">連線 ID: <span id="myIdDisplay" class="id-badge">...</span></p>
        <video id="remoteVideo" autoplay playsinline controls></video>
    </div>

    <!-- 傳送端 UI (手機) -->
    <div id="senderUI" class="hidden">
        <div id="iosWarning" class="warning-box">
            ⚠️ 偵測到 iOS 裝置：<br>
            1. 請點擊右上角「...」選擇<b>「在 Safari 中開啟」</b>。<br>
            2. iOS 網頁版僅支援「投影相機」，不支援全螢幕投影。
        </div>

        <div id="reader"></div>
        <button id="scanBtn" class="btn btn-outline" onclick="toggleScanner()">開啟相機掃描</button>
        
        <div class="input-group">
            <input type="text" id="targetId" placeholder="手動輸入或掃描 ID">
        </div>
        
        <button id="startBtn" class="btn btn-primary" onclick="startMirroring()">開始投影</button>
        <p id="senderStatus" class="status">就緒</p>
    </div>
</div>

<script>
    let peer = null;
    let localStream = null;
    let html5QrCode = null;

    // 檢查是否為 iOS
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    function initReceiver() {
        document.getElementById('appTitle').innerText = "等待連線";
        showUI('receiverUI');
        peer = new Peer();
        peer.on('open', (id) => {
            document.getElementById('myIdDisplay').innerText = id;
            generateQR(id);
        });
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (stream) => {
                const video = document.getElementById('remoteVideo');
                video.srcObject = stream;
                video.classList.add('active');
                document.getElementById('qrcode').style.display = "none";
                document.getElementById('appTitle').innerText = "正在投影";
            });
        });
    }

    function initSender() {
        document.getElementById('appTitle').innerText = "投影至電腦";
        showUI('senderUI');
        if (isIOS) document.getElementById('iosWarning').style.display = 'block';

        const tid = new URLSearchParams(window.location.search).get('target');
        if (tid) document.getElementById('targetId').value = tid;
        peer = new Peer();
    }

    async function toggleScanner() {
        const readerDiv = document.getElementById('reader');
        const scanBtn = document.getElementById('scanBtn');
        
        if (readerDiv.style.display === "block") {
            stopScanner();
            return;
        }

        readerDiv.style.display = "block";
        scanBtn.innerText = "關閉掃描器";
        
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    try {
                        const url = new URL(decodedText);
                        const tid = url.searchParams.get('target') || decodedText;
                        document.getElementById('targetId').value = tid;
                    } catch(e) {
                        document.getElementById('targetId').value = decodedText;
                    }
                    stopScanner();
                }
            );
        } catch (err) {
            alert("請確保已授權相機權限且在 HTTPS 環境下開啟");
            stopScanner();
        }
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = "none";
                document.getElementById('scanBtn').innerText = "開啟相機掃描";
            });
        }
    }

    async function startMirroring() {
        const tid = document.getElementById('targetId').value;
        if (!tid) return alert("請輸入目標 ID");

        try {
            // 優先嘗試螢幕投影，若失敗(如iOS)則嘗試開啟相機
            if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            } else {
                console.log("不支援 getDisplayMedia, 嘗試相機備援");
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
            }

            const call = peer.call(tid, localStream);
            document.getElementById('startBtn').disabled = true;
            document.getElementById('senderStatus').innerText = "投影中，請勿離開網頁";
            
            localStream.getVideoTracks()[0].onended = () => location.reload();
        } catch (err) {
            alert("投影失敗: " + err.message + "\n請確認是否使用 Safari/Chrome 且為 HTTPS 環境。");
        }
    }

    function generateQR(id) {
        const url = window.location.href.split('?')[0] + "?target=" + id;
        new QRCode(document.getElementById("qrcode"), { text: url, width: 200, height: 200 });
    }

    function showUI(id) {
        document.getElementById('setupMode').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }
</script>

</body>
</html>
