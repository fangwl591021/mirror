<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MirrorStream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #07C160;
            --bg: #FFFFFF;
            --line-gray: #EDEDED;
            --text-main: #111111;
            --text-sub: #888888;
            --danger: #FF3B30;
        }
        body {
            font-family: -apple-system, "Helvetica Neue", sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0 16px;
        }
        .header {
            font-size: 17px;
            padding: 16px 0;
            text-align: center;
            border-bottom: 0.5px solid var(--line-gray);
            font-weight: 500;
        }
        .section {
            padding: 20px 0;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: block;
            text-align: center;
            box-sizing: border-box;
            background: none;
        }
        .btn-primary { color: var(--primary); font-weight: 500; }
        .btn-danger { color: var(--danger); }
        .divider { height: 0.5px; background: var(--line-gray); width: 100%; }
        
        input {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            border: none;
            font-size: 28px;
            text-align: center;
            background: var(--line-gray);
            border-radius: 8px;
            margin: 15px 0;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: bold;
        }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; display: none; background: #000; }
        .status { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; }
        .hidden { display: none; }
        video { width: 100%; background: #000; display: none; border-radius: 8px; margin-top: 10px; }
        #remoteVideo.active { display: block; }
        .id-display { font-size: 40px; color: var(--primary); font-weight: bold; letter-spacing: 8px; margin: 15px 0; }
        
        .alert-bar {
            background: #FFF9E6;
            color: #856404;
            padding: 14px;
            font-size: 14px;
            border-radius: 8px;
            margin-top: 15px;
            line-height: 1.5;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header" id="appTitle">MirrorStream</div>
    
    <!-- 初始進入介面 -->
    <div id="setupMode">
        <div class="section">
            <button class="btn btn-primary" onclick="initReceiver()">[ 點此開始接收投影 (電腦端) ]</button>
            <div class="divider"></div>
            <button class="btn btn-primary" onclick="initSender()">[ 點此開始傳送畫面 (手機端) ]</button>
        </div>
    </div>

    <!-- 接收端 UI (電腦) -->
    <div id="receiverUI" class="hidden">
        <div class="section">
            <div id="qrcode"></div>
            <div class="status">連線代碼</div>
            <div id="myIdDisplay" class="id-display">....</div>
            <video id="remoteVideo" autoplay playsinline></video>
            <button id="stopRecvBtn" class="btn btn-danger hidden" onclick="location.reload()">[ 停止連線 ]</button>
        </div>
    </div>

    <!-- 傳送端 UI (手機) -->
    <div id="senderUI" class="hidden">
        <div class="section">
            <div id="reader"></div>
            <button id="scanBtn" class="btn btn-primary" onclick="toggleScanner()">[ 開啟相機掃描 ]</button>
            <div class="divider" style="margin: 10px 0;"></div>
            <input type="text" id="targetId" placeholder="輸入 4 碼 ID" maxlength="4" autocomplete="off">
            <button id="startBtn" class="btn btn-primary" onclick="startMirroring()">[ 啟動鏡像投影 ]</button>
            <button id="stopBtn" class="btn btn-danger hidden" onclick="stopMirroring()">[ 停止投影 ]</button>
            
            <div id="androidNotice" class="alert-bar hidden">
                <b>Android 使用者注意：</b><br>
                1. 請勿在 LINE 內直接開啟。<br>
                2. 請點擊右上角「...」並選擇「使用 Chrome 開啟」。<br>
                3. 若點擊啟動無反應，請檢查 Chrome 權限。
            </div>
            <p id="senderStatus" class="status" style="margin-top:20px;">等待操作</p>
        </div>
    </div>
</div>

<script>
    let peer = null;
    let localStream = null;
    let html5QrCode = null;
    let currentCall = null;

    // 環境檢查
    const isLine = /line/i.test(navigator.userAgent);
    const isAndroid = /android/i.test(navigator.userAgent);

    function initReceiver() {
        const shortId = Math.random().toString(36).substr(2, 4).toUpperCase();
        document.getElementById('appTitle').innerText = "電腦接收端";
        showUI('receiverUI');
        peer = new Peer(shortId);
        peer.on('open', id => {
            document.getElementById('myIdDisplay').innerText = id;
            const u = window.location.href.split('?')[0] + "?target=" + id;
            new QRCode(document.getElementById("qrcode"), { text: u, width: 180, height: 180 });
        });
        peer.on('call', call => {
            currentCall = call;
            call.answer();
            call.on('stream', stream => {
                const v = document.getElementById('remoteVideo');
                v.srcObject = stream;
                v.classList.add('active');
                document.getElementById('qrcode').classList.add('hidden');
                document.getElementById('stopRecvBtn').classList.remove('hidden');
            });
        });
        peer.on('error', e => { if(e.type==='unavailable-id') location.reload(); });
    }

    function initSender() {
        document.getElementById('appTitle').innerText = "手機傳送端";
        showUI('senderUI');
        if(isAndroid && isLine) document.getElementById('androidNotice').classList.remove('hidden');
        const tid = new URLSearchParams(window.location.search).get('target');
        if(tid) document.getElementById('targetId').value = tid.toUpperCase();
        peer = new Peer();
    }

    async function toggleScanner() {
        const r = document.getElementById('reader');
        if(r.style.display === "block") { stopScanner(); return; }
        r.style.display = "block";
        document.getElementById('scanBtn').innerText = "[ 取消掃描 ]";
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, text => {
                try {
                    const url = new URL(text);
                    document.getElementById('targetId').value = url.searchParams.get('target').toUpperCase();
                } catch { document.getElementById('targetId').value = text.toUpperCase(); }
                stopScanner();
            });
        } catch (e) { alert("無法存取相機"); stopScanner(); }
    }

    function stopScanner() {
        if(html5QrCode) html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = "none";
            document.getElementById('scanBtn').innerText = "[ 開啟相機掃描 ]";
        });
    }

    async function startMirroring() {
        const tid = document.getElementById('targetId').value.toUpperCase();
        if(!tid) return alert("請輸入代碼");

        if(!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
            alert("目前環境不支援投影。\n請點擊右上角『...』選擇『在 Chrome 中開啟』");
            return;
        }

        try {
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            currentCall = peer.call(tid, localStream);
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('scanBtn').classList.add('hidden');
            document.getElementById('targetId').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('senderStatus').innerText = "鏡像投影中...";
            localStream.getVideoTracks()[0].onended = () => stopMirroring();
        } catch (err) {
            alert("啟動失敗: " + err.message);
        }
    }

    function stopMirroring() {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        location.reload();
    }

    function showUI(id) {
        document.getElementById('setupMode').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }
</script>

</body>
</html>
